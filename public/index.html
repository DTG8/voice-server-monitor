<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Server X | Monitor</title>
    <!-- Using JetBrains Mono / Space Mono or similar technical font -->
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="grid-background"></div>
    
    <div class="container">
        <header>
            <div class="header-title">
                <h1>Server X</h1>
                <p class="subtitle">Live Device Telemetry</p>
            </div>
            
            <div class="header-controls">
                <button id="theme-toggle" class="btn icon-btn" title="Toggle Theme">
                    <svg id="theme-icon-dark" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
                    <svg id="theme-icon-light" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none;"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
                </button>
                <button id="add-device-btn" class="btn primary-btn">+ Add Device</button>
            </div>
        </header>

        <div class="status-bar">
            <div class="summary-item">
                <span class="indicator global-up"></span>
                <span id="global-status-text">SYS_INIT...</span>
            </div>
            <div class="clock" id="clock">00:00:00</div>
        </div>

        <main id="server-grid" class="server-grid">
            <!-- Server Cards injected via JS -->
            <div class="loading-state">
                <div class="spinner"></div>
                <p>Establishing uplink...</p>
            </div>
        </main>
    </div>

    <!-- Add Device Modal -->
    <div id="add-modal" class="modal-overlay hidden">
        <div class="modal">
            <div class="modal-header">
                <h2>[ NEW_DEVICE ]</h2>
                <button id="close-modal" class="btn-close">&times;</button>
            </div>
            <form id="add-device-form">
                <div class="form-group">
                    <label>Device Name</label>
                    <input type="text" id="dev-name" required placeholder="e.g. Core Switch A">
                </div>
                <div class="form-group">
                    <label>IP Address / Hostname</label>
                    <input type="text" id="dev-host" required placeholder="10.0.0.1">
                </div>
                <div class="form-group">
                    <label>Device Type</label>
                    <select id="dev-type">
                        <option value="server">Server</option>
                        <option value="router">Router</option>
                        <option value="switch">Switch</option>
                    </select>
                </div>
                <div class="modal-actions">
                    <button type="submit" class="btn primary-btn">Provision</button>
                </div>
            </form>
        </div>
    </div>

    <!-- History Modal -->
    <div id="history-modal" class="modal-overlay hidden">
        <div class="modal history-modal-content">
            <div class="modal-header">
                <h2>[ DOWNTIME_HISTORY ]</h2>
                <button id="close-history-modal" class="btn-close">&times;</button>
            </div>
            <div class="history-table-container">
                <table class="history-table">
                    <thead>
                        <tr>
                            <th>Event</th>
                            <th>Time</th>
                            <th>Duration</th>
                        </tr>
                    </thead>
                    <tbody id="history-table-body">
                        <!-- Injected via JS -->
                    </tbody>
                </table>
                <div id="history-empty" class="hidden" style="text-align: center; padding: 20px; color: var(--text-muted);">
                    NO DOWNTIME RECORDS FOUND
                </div>
            </div>
        </div>
    </div>

    <!-- Custom Context Menu -->
    <div id="context-menu" class="context-menu hidden">
        <div class="menu-item" id="menu-ping">
            <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline></svg>
            Ping Now
        </div>
        <div class="menu-separator"></div>
        <div class="menu-item" id="menu-history">
            <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
            View History
        </div>
        <div class="menu-item danger" id="menu-delete">
            <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
            Delete Device
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
